<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ResumeForge - Auth Callback</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1e3a5f 0%, #1e40af 50%, #4338ca 100%);
      color: #e2e8f0;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      max-width: 400px;
    }
    .logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #34d399, #059669);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 900; color: #fff;
      margin: 0 auto 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #34d399; }
    .error { color: #f87171; }
    h2 { margin: 0 0 8px; font-size: 1.25rem; }
    p { margin: 4px 0; font-size: 0.9rem; opacity: 0.8; }
    .close-hint { font-size: 0.8rem; opacity: 0.6; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">R</div>
    <h2>ResumeForge</h2>
    <div class="spinner" id="spinner"></div>
    <div id="status">Completing sign in...</div>
    <p id="detail"></p>
  </div>
  <script src="callback.js"></script>
</body>
</html>
