<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fluxpage - Auth Callback</title>
  <style>
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f8fafc;
      color: #0b1220;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 8px 24px rgba(11, 18, 32, 0.06);
      max-width: 400px;
    }
    .logo {
      width: 56px; height: 56px;
      margin: 0 auto 16px;
    }
    .logo img { display: block; width: 56px; height: 56px; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #0369a1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
    h2 { margin: 0 0 8px; font-size: 1.25rem; }
    p { margin: 4px 0; font-size: 0.9rem; color: #64748b; }
    .close-hint { font-size: 0.8rem; color: #94a3b8; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><img src="icons/logo-mark.svg" width="56" height="56" alt="Fluxpage" /></div>
    <h2>Fluxpage</h2>
    <div class="spinner" id="spinner"></div>
    <div id="status">Completing sign in...</div>
    <p id="detail"></p>
  </div>
  <script src="callback.js"></script>
</body>
</html>
