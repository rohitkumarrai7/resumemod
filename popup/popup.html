<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=360" />
  <title>ResumeForge</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <div class="popup-header">
      <div class="popup-logo">R</div>
      <div class="popup-title">
        <div class="app-name">ResumeForge</div>
        <div class="app-tagline">ATS Optimizer</div>
      </div>
    </div>

    <div class="popup-body">
      <div class="auth-section" id="authSection">
        <div id="authInfo" class="auth-info"></div>
        <button id="authBtn" class="btn btn-primary btn-sm"></button>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="savedCount">0</div>
          <div class="stat-label">Saved Jobs</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="lastScore">\u2014</div>
          <div class="stat-label">Last ATS Score</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="resumeCount">0</div>
          <div class="stat-label">Resumes</div>
        </div>
      </div>

      <div class="quick-actions">
        <button class="btn btn-outline full-width" id="openDashboard">Open Dashboard</button>
        <div class="browse-row">
          <button class="btn btn-outline browse-btn" id="openLinkedInJobs">LinkedIn</button>
          <button class="btn btn-outline browse-btn" id="openInternshalaJobs">Internshala</button>
          <button class="btn btn-outline browse-btn" id="openNaukriJobs">Naukri</button>
        </div>
      </div>
    </div>

    <div class="popup-footer">
      ResumeForge v2.0 &middot; <a href="https://resumeforge.io" target="_blank">resumeforge.io</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
